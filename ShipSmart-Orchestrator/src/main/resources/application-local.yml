# Local development profile
# JWT secret is optional — filter falls back to unsigned decode.

shipsmart:
  security:
    require-jwt-secret: false
  mcp:
    base-url: ${SHIPSMART_MCP_URL:http://localhost:8001}
    api-key: ${SHIPSMART_MCP_API_KEY:}

logging:
  level:
    com.shipsmart: DEBUG
    org.springframework.security: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      export:
        # Local dev samples traces but must NOT require an OTLP collector: with no
        # endpoint the exporter bean fails validation ("Invalid endpoint") and crashes
        # `java -jar` boot. Disable export locally; set an endpoint + enable to ship spans.
        enabled: false
