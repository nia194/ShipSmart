name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Supabase client (src/integrations/supabase/client.ts) throws if these
      # are unset. They live in .env.local locally (gitignored), so CI needs dummy
      # values. Loaded by Vite for both the vitest and build steps.
      - name: Provide dummy Supabase env for CI (tests + build)
        run: |
          echo "VITE_SUPABASE_URL=https://example.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=ci-dummy-anon-key" >> .env

      - name: Lint (eslint)
        run: pnpm lint

      - name: Type-check (tsc)
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Build (vite)
        run: pnpm build

      # Dependency hygiene (guardrails §5.9). Report-only (high severity) so a
      # pre-existing advisory informs triage without blocking the build.
      - name: Dependency audit (pnpm audit, report-only)
        run: pnpm audit --audit-level high || true
