# ─────────────────────────────────────────────────────────────────────────────
# ShipSmart — Render Deployment Configuration
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined here:
#   1. web          → React frontend (Static Site)
#   2. api-java     → Spring Boot backend (Web Service)
#   3. api-python   → FastAPI backend (Web Service)
#
# RECOMMENDATION: Deploy the React frontend as a Render Static Site.
# Reason: The app is a Vite SPA with no server-side rendering requirement.
# Static Sites are free on Render, deploy from a CDN, and have no cold starts.
# If SSR or server-side auth handling is ever needed, switch to a Web Service.
#
# Replace [PLACEHOLDER] values before committing this file.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: [RENDER_SERVICE_NAME_WEB]
    runtime: static
    rootDir: apps/web
    buildCommand: pnpm install && pnpm build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_JAVA_API_BASE_URL
        value: https://[RENDER_SERVICE_NAME_JAVA].onrender.com
      - key: VITE_PYTHON_API_BASE_URL
        value: https://[RENDER_SERVICE_NAME_PYTHON].onrender.com
      - key: VITE_APP_ENV
        value: production

  # ── Spring Boot Java API (Web Service) ───────────────────────────────────
  - type: web
    name: [RENDER_SERVICE_NAME_JAVA]
    runtime: java
    rootDir: apps/api-java
    buildCommand: ./gradlew build -x test
    startCommand: java -jar build/libs/shipsmart-api-java-*.jar
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://[RENDER_SERVICE_NAME_WEB].onrender.com
      - key: PYTHON_API_BASE_URL
        value: https://[RENDER_SERVICE_NAME_PYTHON].onrender.com

  # ── FastAPI Python API (Web Service) ─────────────────────────────────────
  - type: web
    name: [RENDER_SERVICE_NAME_PYTHON]
    runtime: python
    rootDir: apps/api-python
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JAVA_API_BASE_URL
        value: https://[RENDER_SERVICE_NAME_JAVA].onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://[RENDER_SERVICE_NAME_WEB].onrender.com
